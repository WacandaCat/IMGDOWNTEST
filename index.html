<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLBS Image Saver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface-muted: #f2efe9;
      --text: #171717;
      --muted: #6e675f;
      --border: #ddd8cf;
      --primary: #111111;
      --inverse: #ffffff;
      --success: #1f6b3b;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-sm: 14px;
      --radius-lg: 20px;
      --shadow: 0 18px 42px rgba(17, 17, 17, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0 16px 116px;
    }
    img { display: block; max-width: 100%; height: auto; }
    button, input, a { font: inherit; }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 0 10px;
    }
    .header img { width: 96px; }
    .intro { text-align: center; margin-bottom: 12px; }
    .intro h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 1.3rem + 2vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.045em;
    }
    .notice {
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--muted);
      line-height: 1.55;
      box-shadow: var(--shadow);
    }
    .notice strong { color: var(--text); }
    .toolbar {
      position: sticky;
      top: 10px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(247, 246, 242, 0.9);
      backdrop-filter: blur(12px);
    }
    .toolbar-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 0 18px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--inverse);
      border-color: var(--primary);
    }
    .btn-secondary { background: var(--surface-muted); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status {
      color: var(--muted);
      font-weight: 700;
      padding: 0 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }
    .item {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    .item:hover { transform: translateY(-2px); }
    .item.is-selected { border-color: var(--primary); }
    .check {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      width: 24px;
      height: 24px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .thumb {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--surface-muted);
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.12);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }
    .item.is-selected .overlay { opacity: 1; }
    .meta { padding: 14px 16px 16px; }
    .meta strong { display: block; margin-bottom: 4px; }
    .meta span { display: block; color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .actions .btn {
      flex: 1 1 0;
      min-width: 120px;
    }
    .bottom-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 10;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      padding: 14px 16px;
    }
    .bottom-inner {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .message {
      color: var(--muted);
      font-weight: 600;
      min-height: 24px;
      flex: 1;
    }
    .download-btn {
      min-width: min(360px, 100%);
      min-height: 52px;
      border: 0;
      border-radius: 999px;
      background: var(--primary);
      color: var(--inverse);
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .helper-ok { color: var(--success); }
    .is-mobile .desktop-only { display: none; }
    .is-mobile .check { display: none; }
    .is-mobile .item { border-color: var(--border); }
    .is-mobile .bottom-bar { display: none; }
    .is-ios .per-item-download { display: none !important; }
    .is-ios .actions .per-item-open { flex: 1 1 100%; }
    @media (max-width: 768px) {
      .bottom-inner { flex-direction: column; align-items: stretch; }
      .download-btn { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <img src="https://slbs.shop/web/upload/slbs/images/logo/slbs/logo-default.svg" alt="SLBS logo" width="96" height="28">
    </header>
  </br<>
    <section class="notice" id="browserNotice">
      브라우저 환경을 확인하는 중입니다.
    </section>

    <section class="toolbar desktop-only">
      <div class="toolbar-group">
        <button class="btn" id="selectAll" type="button">전체선택</button>
        <button class="btn" id="clearAll" type="button">전체해제</button>
      </div>
      <div class="status" id="statusText">0개 선택됨</div>
    </section>

    <main class="grid" id="imageGrid">
      <article class="item">
        <input class="check" type="checkbox" data-url="https://slbs.shop/web/product/medium/202605/6d44f87c18a87e9bd8072da3535c0425.png" data-filename="slbs-image-1.png" aria-label="image-1 선택">
        <div class="thumb"><div class="overlay"></div><img src="https://slbs.shop/web/product/medium/202605/6d44f87c18a87e9bd8072da3535c0425.png" alt="image-1" loading="lazy" width="800" height="800"></div>
        <div class="meta">
          <div class="actions">
            <button class="btn btn-primary per-item-download" type="button" data-url="https://slbs.shop/web/product/medium/202605/6d44f87c18a87e9bd8072da3535c0425.png" data-filename="slbs-image-1.png">저장하기</button>
            <a class="btn btn-secondary per-item-open" href="/api/open?url=https%3A%2F%2Fslbs.shop%2Fweb%2Fproduct%2Fmedium%2F202605%2F6d44f87c18a87e9bd8072da3535c0425.png" target="_blank" rel="noopener noreferrer">이미지 열기</a>
          </div>
        </div>
      </article>

      <article class="item">
        <input class="check" type="checkbox" data-url="https://slbs.shop/web/product/medium/202605/67ba7b450c3397ed08b14518b11ba88a.png" data-filename="slbs-image-2.png" aria-label="image-2 선택">
        <div class="thumb"><div class="overlay"></div><img src="https://slbs.shop/web/product/medium/202605/67ba7b450c3397ed08b14518b11ba88a.png" alt="image-2" loading="lazy" width="800" height="800"></div>
        <div class="meta">
           <div class="actions">
            <button class="btn btn-primary per-item-download" type="button" data-url="https://slbs.shop/web/product/medium/202605/67ba7b450c3397ed08b14518b11ba88a.png" data-filename="slbs-image-2.png">저장하기</button>
            <a class="btn btn-secondary per-item-open" href="/api/open?url=https%3A%2F%2Fslbs.shop%2Fweb%2Fproduct%2Fmedium%2F202605%2F67ba7b450c3397ed08b14518b11ba88a.png" target="_blank" rel="noopener noreferrer">이미지 열기</a>
          </div>
        </div>
      </article>

      <article class="item">
        <input class="check" type="checkbox" data-url="https://slbs.shop/web/product/medium/202510/6dbea70f3b8c94fec0a8103154d1f02a.png" data-filename="slbs-image-3.png" aria-label="image-3 선택">
        <div class="thumb"><div class="overlay"></div><img src="https://slbs.shop/web/product/medium/202510/6dbea70f3b8c94fec0a8103154d1f02a.png" alt="image-3" loading="lazy" width="800" height="800"></div>
        <div class="meta">
          <div class="actions">
            <button class="btn btn-primary per-item-download" type="button" data-url="https://slbs.shop/web/product/medium/202510/6dbea70f3b8c94fec0a8103154d1f02a.png" data-filename="slbs-image-3.png">저장하기</button>
            <a class="btn btn-secondary per-item-open" href="/api/open?url=https%3A%2F%2Fslbs.shop%2Fweb%2Fproduct%2Fmedium%2F202510%2F6dbea70f3b8c94fec0a8103154d1f02a.png" target="_blank" rel="noopener noreferrer">이미지 열기</a>
          </div>
        </div>
      </article>

      <article class="item">
        <input class="check" type="checkbox" data-url="https://slbs.shop/web/product/medium/202407/ad9e9160b1b1ff02fa8534988042c34c.png" data-filename="slbs-image-4.png" aria-label="image-4 선택">
        <div class="thumb"><div class="overlay"></div><img src="https://slbs.shop/web/product/medium/202407/ad9e9160b1b1ff02fa8534988042c34c.png" alt="image-4" loading="lazy" width="800" height="800"></div>
        <div class="meta">
          <div class="actions">
            <button class="btn btn-primary per-item-download" type="button" data-url="https://slbs.shop/web/product/medium/202407/ad9e9160b1b1ff02fa8534988042c34c.png" data-filename="slbs-image-4.png">저장하기</button>
            <a class="btn btn-secondary per-item-open" href="/api/open?url=https%3A%2F%2Fslbs.shop%2Fweb%2Fproduct%2Fmedium%2F202407%2Fad9e9160b1b1ff02fa8534988042c34c.png" target="_blank" rel="noopener noreferrer">이미지 열기</a>
          </div>
        </div>
      </article>
    </main>
  </div>

  <div class="bottom-bar desktop-only">
    <div class="bottom-inner">
      <div class="message" id="message">PC에서는 선택 후 일괄 다운로드가 가능합니다.</div>
      <button class="download-btn" id="downloadBtn" type="button" disabled>(0) DOWNLOAD</button>
    </div>
  </div>

  <script>
    const ua = navigator.userAgent || '';
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);
    const isMobile = isIOS || isAndroid;
    const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
    const isKakao = /KAKAOTALK/i.test(ua);

    const body = document.body;
    const browserNotice = document.getElementById('browserNotice');
    const message = document.getElementById('message');
    const statusText = document.getElementById('statusText');
    const downloadBtn = document.getElementById('downloadBtn');

    if (isMobile) body.classList.add('is-mobile');
    if (isIOS) body.classList.add('is-ios');

    function checks() {
      return [...document.querySelectorAll('.check')];
    }

    function selectedItems() {
      return checks().filter((el) => el.checked).map((el) => ({ url: el.dataset.url, filename: el.dataset.filename }));
    }

    function updateCount() {
      const count = selectedItems().length;
      if (downloadBtn) {
        downloadBtn.disabled = count === 0;
        downloadBtn.textContent = `(${count}) DOWNLOAD`;
      }
      if (statusText) statusText.textContent = `${count}개 선택됨`;
      checks().forEach((el) => el.closest('.item').classList.toggle('is-selected', el.checked));
    }

    function triggerBlobDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
    }

    function updateNotice() {
      if (isIOS) {
        browserNotice.innerHTML = '<strong>iPhone 브라우저</strong>에서는 다운로드 버튼을 숨기고 <strong>이미지 열기</strong>만 제공합니다. 열린 화면에서 길게 눌러 사진 저장을 사용하세요.';
      } else if (isKakao) {
        browserNotice.innerHTML = '<strong>카카오톡 인앱브라우저</strong>에서는 다운로드가 자주 차단됩니다. 아래 <strong>이미지 열기</strong>를 눌러 새 브라우저 화면에서 저장하거나, 우측 상단 메뉴에서 외부 브라우저로 여는 방식을 권장합니다.';
      } else if (isSafari && isMobile) {
        browserNotice.innerHTML = '<strong>iPhone Safari</strong>에서는 자동 다운로드보다 <strong>이미지 열기</strong> 후 길게 눌러 사진 저장하는 방식이 더 안정적입니다.';
      } else if (isMobile) {
        browserNotice.innerHTML = '<strong>모바일 브라우저</strong>에서는 카드별 <strong>저장하기</strong> 또는 <strong>이미지 열기</strong>를 사용하세요. 일괄 다운로드는 PC에서만 유지됩니다.';
      } else {
        browserNotice.innerHTML = '<strong>PC 브라우저</strong>에서는 다중 선택 후 일괄 다운로드를 사용할 수 있습니다. 모바일과 인앱브라우저에서는 카드별 저장 흐름이 더 안정적입니다.';
      }
    }

    async function handlePerItemDownload(button) {
      const url = button.dataset.url;
      const filename = button.dataset.filename;

      if (isIOS || isKakao || (isSafari && isMobile)) {
        window.open(`/api/open?url=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
        return;
      }

      button.disabled = true;
      const original = button.textContent;
      button.textContent = '처리 중...';

      try {
        const response = await fetch(`/api/download?url=${encodeURIComponent(url)}&filename=${encodeURIComponent(filename)}`);
        if (!response.ok) throw new Error(await response.text() || '다운로드 실패');
        const blob = await response.blob();
        triggerBlobDownload(blob, filename);
        button.textContent = '완료';
        button.classList.add('helper-ok');
        setTimeout(() => {
          button.textContent = original;
          button.classList.remove('helper-ok');
          button.disabled = false;
        }, 1200);
      } catch (error) {
        button.disabled = false;
        button.textContent = original;
        window.open(`/api/open?url=${encodeURIComponent(url)}`, '_blank', 'noopener,noreferrer');
      }
    }

    async function handleBulkDownload() {
      const items = selectedItems();
      if (!items.length || isIOS) return;
      const original = downloadBtn.textContent;
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'DOWNLOADING...';
      message.textContent = '선택한 이미지를 순차 다운로드 중입니다.';

      try {
        for (let i = 0; i < items.length; i += 1) {
          const item = items[i];
          message.textContent = `${i + 1}/${items.length} 다운로드 중`;
          const response = await fetch(`/api/download?url=${encodeURIComponent(item.url)}&filename=${encodeURIComponent(item.filename)}`);
          if (!response.ok) throw new Error(await response.text() || '다운로드 실패');
          const blob = await response.blob();
          triggerBlobDownload(blob, item.filename);
          await new Promise((resolve) => setTimeout(resolve, 900));
        }
        message.textContent = '선택한 이미지 다운로드가 완료되었습니다.';
      } catch (error) {
        message.textContent = '일부 다운로드가 실패했습니다.';
      } finally {
        downloadBtn.disabled = selectedItems().length === 0;
        downloadBtn.textContent = original;
      }
    }

    document.getElementById('selectAll')?.addEventListener('click', () => {
      checks().forEach((el) => { el.checked = true; });
      updateCount();
    });

    document.getElementById('clearAll')?.addEventListener('click', () => {
      checks().forEach((el) => { el.checked = false; });
      updateCount();
    });

    checks().forEach((el) => el.addEventListener('change', updateCount));
    document.querySelectorAll('.per-item-download').forEach((button) => {
      button.addEventListener('click', () => handlePerItemDownload(button));
    });
    downloadBtn?.addEventListener('click', handleBulkDownload);

    updateNotice();
    updateCount();
  </script>
</body>
</html>
